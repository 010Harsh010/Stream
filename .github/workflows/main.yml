name: Docker Compose Update
on:
  push:
    branches: ["main"]
    paths:
      - "docker-compose.yml"
      - "prometheus-config.yml"
      - "nginx/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/streamx
            cd Stream
            git pull origin main
            cd ..

            cp Stream/docker-compose.yml ./docker-compose.yml

            cp Stream/prometheus-config.yml ./prometheus-config.yml

            rm -rf nginx/*
            cp -r Stream/nginx/* nginx/

            docker compose up -d --build
            docker image prune -f